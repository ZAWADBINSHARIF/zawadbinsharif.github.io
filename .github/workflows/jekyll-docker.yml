name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]       # or master, depending on your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production   # name of your environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Replace secrets in HTML files
        run: |
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" admin.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
